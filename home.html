<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Meesho - Login & Home</title>
<style>
body {margin:0;font-family:Poppins,sans-serif;background:#f8f8f8;}
header.navbar{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:linear-gradient(135deg,violet,skyblue);color:white;}
header .logo{font-size:26px;font-weight:bold;cursor:pointer;}
.nav-icons span{margin-left:20px;cursor:pointer;font-weight:bold;}
main{padding:20px;}
.product-card{background:white;border-radius:15px;padding:15px;width:200px;box-shadow:0 3px 6px rgba(0,0,0,0.1);cursor:pointer;position:relative;margin:10px;display:inline-block;}
.wishlist-btn{position:absolute;top:10px;right:10px;font-size:22px;color:#bbb;cursor:pointer;}
.wishlist-btn.active{color:red;}
input, button{padding:8px 10px;margin:5px;border-radius:5px;border:1px solid #ccc;}
button{cursor:pointer;background:violet;color:white;border:none;}
#loginDiv, #signupDiv{max-width:300px;margin:50px auto;padding:20px;background:white;border-radius:15px;box-shadow:0 3px 6px rgba(0,0,0,0.1);}
#productsContainer{max-width:900px;margin:auto;display:flex;flex-wrap:wrap;justify-content:center;}
</style>
</head>
<body>

<!-- HEADER -->
<header class="navbar">
    <div class="logo" onclick="showHome()">Mini Meesho</div>
    <div class="nav-icons">
        <span onclick="showHome()">🏠 Home</span>
        <span onclick="showWishlist()">❤️ Wishlist</span>
        <span onclick="showCart()">🛒 Cart</span>
        <span onclick="showProfile()">👤 Profile</span>
    </div>
</header>

<!-- LOGIN -->
<div id="loginDiv">
    <h2>Login</h2>
    <input type="text" id="loginUsername" placeholder="Username"><br>
    <input type="password" id="loginPassword" placeholder="Password"><br>
    <button onclick="login()">Login</button>
    <p>Don't have account? <span style="color:blue;cursor:pointer;" onclick="showSignup()">Signup</span></p>
</div>

<!-- SIGNUP -->
<div id="signupDiv" style="display:none;">
    <h2>Signup</h2>
    <input type="text" id="signupUsername" placeholder="Username"><br>
    <input type="password" id="signupPassword" placeholder="Password"><br>
    <button onclick="signup()">Signup</button>
    <p>Already have account? <span style="color:blue;cursor:pointer;" onclick="showLogin()">Login</span></p>
</div>

<!-- PRODUCTS HOME -->
<main id="homeDiv" style="display:none;">
    <input type="text" id="searchInput" placeholder="Search products..." style="width:100%;max-width:400px;">
    <div id="productsContainer"></div>
</main>

<script>
// ===== Data =====
let users = JSON.parse(localStorage.getItem("users")||"{}");
let wishlistData = JSON.parse(localStorage.getItem("wishlist")||"{}");
let loggedInUser = JSON.parse(localStorage.getItem("loggedInUser")||"null");

const products = [
    {id:1,name:"Product A",price:499,description:"This is Product A"},
    {id:2,name:"Product B",price:799,description:"This is Product B"},
    {id:3,name:"Product C",price:299,description:"This is Product C"},
    {id:4,name:"Product D",price:999,description:"This is Product D"}
];

// ===== Show / Hide =====
function showLogin(){document.getElementById("loginDiv").style.display="block";document.getElementById("signupDiv").style.display="none";document.getElementById("homeDiv").style.display="none";}
function showSignup(){document.getElementById("signupDiv").style.display="block";document.getElementById("loginDiv").style.display="none";document.getElementById("homeDiv").style.display="none";}
function showHome(){if(loggedInUser){document.getElementById("homeDiv").style.display="block";document.getElementById("loginDiv").style.display="none";document.getElementById("signupDiv").style.display="none";renderProducts();} else {showLogin();}}
function showWishlist(){alert("Wishlist page will open");}
function showCart(){alert("Cart page will open");}
function showProfile(){alert("Profile page will open");}

// ===== Login / Signup =====
function signup(){
    const u = document.getElementById("signupUsername").value.trim();
    const p = document.getElementById("signupPassword").value.trim();
    if(!u||!p){alert("Fill all fields"); return;}
    if(users[u]){alert("Username exists"); return;}
    users[u] = {password:p};
    localStorage.setItem("users",JSON.stringify(users));
    alert("Signup successful"); showLogin();
}

function login(){
    const u = document.getElementById("loginUsername").value.trim();
    const p = document.getElementById("loginPassword").value.trim();
    if(users[u] && users[u].password===p){
        loggedInUser={username:u};
        localStorage.setItem("loggedInUser",JSON.stringify(loggedInUser));
        if(!wishlistData[u]) wishlistData[u]=[];
        localStorage.setItem("wishlist",JSON.stringify(wishlistData));
        showHome();
    } else {alert("Invalid credentials");}
}

// ===== Products =====
function renderProducts(){
    const container = document.getElementById("productsContainer");
    container.innerHTML="";
    const search = document.getElementById("searchInput").value.toLowerCase();
    products.filter(p=>p.name.toLowerCase().includes(search)).forEach(p=>{
        const card = document.createElement("div");
        card.className="product-card";
        const userWishlist = wishlistData[loggedInUser.username] || [];
        card.innerHTML = `
            <div class="wishlist-btn ${userWishlist.includes(p.id)?'active':''}" onclick="toggleWishlist(event,${p.id})">❤</div>
            <h3>${p.name}</h3>
            <p>₹${p.price}</p>
            <p>${p.description}</p>
        `;
        container.appendChild(card);
    });
}

document.getElementById("searchInput").addEventListener("input",renderProducts);

// ===== Wishlist toggle =====
function toggleWishlist(e,id){
    e.stopPropagation();
    const userWishlist = wishlistData[loggedInUser.username];
    if(userWishlist.includes(id)){
        wishlistData[loggedInUser.username] = userWishlist.filter(x=>x!==id);
    } else { userWishlist.push(id); }
    localStorage.setItem("wishlist",JSON.stringify(wishlistData));
    renderProducts();
}

// ===== Auto-login =====
if(loggedInUser){ showHome(); }
</script>

</body>
</html>
