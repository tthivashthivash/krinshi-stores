<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Meesho - Product Details</title>
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#f8f8f8;}
header.navbar{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:linear-gradient(135deg,violet,skyblue);color:white;box-shadow:0 3px 8px rgba(0,0,0,0.1);}
header .logo{font-size:26px;font-weight:bold;cursor:pointer;}
header .nav-icons span{margin-left:20px;cursor:pointer;font-weight:bold;}
main{padding:20px;}
.product-detail{max-width:500px;margin:30px auto;padding:20px;background:white;border-radius:15px;box-shadow:0 3px 6px rgba(0,0,0,0.1);}
.product-detail h2{margin-bottom:10px;}
.product-detail p{margin:10px 0;font-size:18px;}
.product-detail input[type=number]{width:60px;padding:5px;margin-right:10px;border-radius:5px;border:1px solid #ccc;}
.product-detail button{padding:10px 15px;border:none;border-radius:20px;background:violet;color:white;cursor:pointer;font-size:16px;transition:0.3s;margin-right:10px;}
.product-detail button:hover{opacity:0.8;}
</style>
</head>
<body>

<header class="navbar">
    <div class="logo" onclick="redirect('home.html')">Mini Meesho</div>
    <div class="nav-icons">
        <span onclick="redirect('wishlist.html')">❤️ Wishlist</span>
        <span onclick="redirect('cart.html')">🛒 Cart</span>
        <span onclick="redirect('orders.html')">📦 Orders</span>
        <span onclick="redirect('profile.html')">👤 Profile</span>
    </div>
</header>

<main>
    <div class="product-detail" id="productDetail"></div>
</main>

<script>
function redirect(page){window.location.href=page;}

// LOGIN CHECK
let loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));
if(!loggedInUser){ alert("Login first"); redirect("index.html"); }

// DUMMY PRODUCTS
const products=[
    {id:1,name:"Product A",price:499, description:"This is Product A description."},
    {id:2,name:"Product B",price:799, description:"This is Product B description."},
    {id:3,name:"Product C",price:299, description:"This is Product C description."},
    {id:4,name:"Product D",price:999, description:"This is Product D description."}
];

// LOAD SELECTED PRODUCT
let selectedId = parseInt(localStorage.getItem("selectedProduct"));
let product = products.find(p=>p.id===selectedId);
let detailDiv = document.getElementById("productDetail");

if(product){
    detailDiv.innerHTML=`
        <h2>${product.name}</h2>
        <p>Price: ₹${product.price}</p>
        <p>${product.description}</p>
        <label>Quantity:</label>
        <input type="number" id="qty" value="1" min="1">
        <br><br>
        <button onclick="addToCart(${product.id})">Add to Cart</button>
        <button onclick="buyNow(${product.id})">Buy Now</button>
    `;
}else{
    detailDiv.innerHTML="<p>Product not found!</p>";
}

// ADD TO CART
function addToCart(id){
    let qty = parseInt(document.getElementById("qty").value);
    if(qty<1) qty=1;
    let cart = JSON.parse(localStorage.getItem("cart")||"[]");
    const exist = cart.find(item=>item.id===id);
    if(exist){ exist.quantity += qty; }
    else{ cart.push({id,quantity:qty}); }
    localStorage.setItem("cart",JSON.stringify(cart));
    alert("Added to cart!");
}

// BUY NOW
function buyNow(id){
    addToCart(id);
    redirect("cart.html");
}
</script>

</body>
</html>
