<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Meesho - My Orders</title>
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#f8f8f8;}
header.navbar{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:linear-gradient(135deg,violet,skyblue);color:white;}
header .logo{font-size:26px;font-weight:bold;cursor:pointer;}
header .nav-icons span{margin-left:20px;cursor:pointer;font-weight:bold;}
main{padding:20px;max-width:900px;margin:auto;}
.order-card{background:white;border-radius:15px;padding:15px;margin-bottom:20px;box-shadow:0 3px 6px rgba(0,0,0,0.1);}
.order-card h3{margin:0 0 10px 0;}
.order-card p{margin:5px 0;color:gray;}
.order-item{padding-left:15px;}
</style>
</head>
<body>

<header class="navbar">
    <div class="logo" onclick="redirect('home.html')">Mini Meesho</div>
    <div class="nav-icons">
        <span onclick="redirect('wishlist.html')">❤️ Wishlist</span>
        <span onclick="redirect('cart.html')">🛒 Cart</span>
        <span onclick="redirect('orders.html')">📦 Orders</span>
        <span onclick="redirect('profile.html')">👤 Profile</span>
    </div>
</header>

<main>
    <h2 style="text-align:center;">My Orders</h2>
    <div id="ordersContainer"></div>
</main>

<script>
function redirect(page){window.location.href=page;}

// LOGIN USER
let loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));
if(!loggedInUser){ alert("Login first"); redirect("index.html"); }
let username = loggedInUser.username;

// PRODUCTS
const products = [
    {id:1,name:"Product A",price:499},
    {id:2,name:"Product B",price:799},
    {id:3,name:"Product C",price:299},
    {id:4,name:"Product D",price:999}
];

// LOAD ORDERS
let allOrders = JSON.parse(localStorage.getItem("orders")||"{}");
let userOrders = allOrders[username] || [];

const container = document.getElementById("ordersContainer");

if(userOrders.length===0){
    container.innerHTML="<p style='text-align:center;'>You have no orders yet.</p>";
}else{
    userOrders.forEach((order,index)=>{
        const div = document.createElement("div");
        div.className="order-card";
        div.innerHTML = `
            <h3>Order #${index+1} - ${order.date}</h3>
            <p><strong>Total:</strong> ₹${order.total}</p>
            <p><strong>Payment:</strong> ${order.payment}</p>
            <p><strong>Address:</strong> ${order.address}</p>
            <p><strong>Items:</strong></p>
            <ul>
                ${order.items.map(item=>{
                    let p = products.find(pr=>pr.id===item.id);
                    return `<li class="order-item">${p.name} x ${item.quantity} = ₹${p.price*item.quantity}</li>`;
                }).join('')}
            </ul>
        `;
        container.appendChild(div);
    });
}
</script>

</body>
</html>
